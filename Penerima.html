<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Real-time MQTT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4">
        <div class="text-center text-white mb-5">
            <h1 class="display-4 fw-bold mb-3">
                <i class="fas fa-satellite me-3"></i>REAL-TIME MQTT MONITOR
            </h1>
            <div class="d-flex justify-content-center gap-3 mb-4">
                <div class="connection-status bg-dark bg-opacity-50">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="connectionText">Menghubungkan...</span>
                </div>
                <div class="message-count">
                    <i class="fas fa-envelope me-2"></i>
                    <span id="messageCount">0</span> pesan
                </div>
                <div class="connection-status bg-dark bg-opacity-50">
                    <i class="fas fa-clock me-2"></i>
                    <span id="lastUpdateTime">-</span>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="glass-card h-100">
                    <div class="card-header bg-primary bg-opacity-25 text-primary text-center">RT 1</div>
                    <div class="card-body text-center">
                        <div class="publisher-title">Suhu</div>
                        <div class="value-display temperature-value" id="temp1">--.--°C</div>
                        <div class="publisher-title mt-4">Gas</div>
                        <div class="value-display gas-value" id="gas1">---</div>
                        <div class="publisher-title mt-4">Electricity</div>
                        <div class="d-flex align-items-center justify-content-center">
                            <span class="led-indicator led-off" id="ledIndicator1"></span>
                            <span class="h4 fw-bold" id="ledStatus1">OFF</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass-card h-100">
                    <div class="card-header bg-success bg-opacity-25 text-success text-center">RT 2</div>
                    <div class="card-body text-center">
                        <div class="publisher-title">Suhu</div>
                        <div class="value-display temperature-value" id="temp2">--.--°C</div>
                        <div class="publisher-title mt-4">Gas</div>
                        <div class="value-display gas-value" id="gas2">---</div>
                        <div class="publisher-title mt-4">Electricity</div>
                        <div class="d-flex align-items-center justify-content-center">
                            <span class="led-indicator led-off" id="ledIndicator2"></span>
                            <span class="h4 fw-bold" id="ledStatus2">OFF</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass-card h-100">
                    <div class="card-header bg-warning bg-opacity-25 text-warning text-center">RT 3</div>
                    <div class="card-body text-center">
                        <div class="publisher-title">Suhu</div>
                        <div class="value-display temperature-value" id="temp3">--.--°C</div>
                        <div class="publisher-title mt-4">Gas</div>
                        <div class="value-display gas-value" id="gas3">---</div>
                        <div class="publisher-title mt-4">Electricity</div>
                        <div class="d-flex align-items-center justify-content-center">
                            <span class="led-indicator led-off" id="ledIndicator3"></span>
                            <span class="h4 fw-bold" id="ledStatus3">OFF</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12">
                <div class="glass-card p-4">
                    <h5 class="mb-4 fw-bold text-center"><i class="fas fa-chart-line me-2"></i>ANALISA GRAFIK REAL-TIME</h5>
                    <div class="row">
                        <div class="col-md-6"><canvas id="tempChart"></canvas></div>
                        <div class="col-md-6"><canvas id="gasChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="glass-card">
                    <div class="card-header bg-white text-dark d-flex justify-content-between align-items-center">
                        <span class="fw-bold"><i class="fas fa-history me-2"></i>RIWAYAT LOG SENSOR</span>
                        <button class="btn btn-success btn-sm" onclick="downloadCSV()">
                            <i class="fas fa-file-download me-2"></i>Ekspor ke CSV (.csv)
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive table-container">
                            <table class="table table-hover mb-0 text-center">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>Waktu</th>
                                        <th>Sumber</th>
                                        <th>Tipe Sensor</th>
                                        <th>Nilai Terukur</th>
                                    </tr>
                                </thead>
                                <tbody id="historyBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
